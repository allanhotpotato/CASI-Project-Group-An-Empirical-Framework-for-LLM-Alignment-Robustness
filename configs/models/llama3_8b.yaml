model:
  name: "llama3-8b"
  hf_model_id: "meta-llama/Meta-Llama-3-8B"
  num_layers: 32
  hidden_size: 4096
  num_attention_heads: 32
  dtype: "bfloat16"
  # Weight matrices to analyze for SVD/Hessian fragility
  target_weight_matrices:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
